AWSTemplateFormatVersion: '2010-09-09'
Description: 'Admin console SPA for user and quota management with ALB + Lambda + OIDC'

Parameters:
  IdentityPoolName:
    Type: String
    Description: Name prefix for resources (from identity pool name)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for ALB and Lambda

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for ALB (minimum 2 AZs)

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for Lambda (minimum 2 AZs) - kept for deploy command compatibility

  ALBScheme:
    Type: String
    Default: 'internet-facing'
    AllowedValues:
      - 'internet-facing'
      - 'internal'
    Description: 'ALB scheme. Use "internal" for private VPC access only (requires VPN/Direct Connect and NAT for OIDC).'

  IdPProvider:
    Type: String
    AllowedValues: [okta, azure, auth0, cognito]
    Description: Identity provider type

  # Okta parameters
  OktaDomain:
    Type: String
    Default: ''
    Description: Okta domain (e.g., company.okta.com)

  OktaClientId:
    Type: String
    Default: ''
    Description: Okta web application client ID

  OktaClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Okta client secret

  # Azure AD parameters
  AzureTenantId:
    Type: String
    Default: ''
    Description: Azure AD tenant ID

  AzureClientId:
    Type: String
    Default: ''
    Description: Azure AD web application client ID

  AzureClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Azure client secret

  # Auth0 parameters
  Auth0Domain:
    Type: String
    Default: ''
    Description: Auth0 domain (e.g., company.auth0.com)

  Auth0ClientId:
    Type: String
    Default: ''
    Description: Auth0 web application client ID

  Auth0ClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Auth0 client secret

  # Cognito parameters
  CognitoUserPoolId:
    Type: String
    Default: ''
    Description: Cognito User Pool ID

  CognitoUserPoolDomain:
    Type: String
    Default: ''
    Description: Cognito User Pool domain prefix

  CognitoClientId:
    Type: String
    Default: ''
    Description: Cognito web application client ID

  CognitoClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Cognito client secret

  CustomDomainName:
    Type: String
    Description: 'REQUIRED: Custom domain for admin console (e.g., admin.example.com).'
    AllowedPattern: '.+'
    ConstraintDescription: 'Custom domain is required for authenticated admin console.'

  ExistingCertificateArn:
    Type: String
    Default: ''
    Description: '(Optional) ARN of an existing ACM certificate.'

  HostedZoneId:
    Type: String
    Default: ''
    Description: '(Optional) Route53 hosted zone ID for automatic DNS record creation.'

  DeploymentTimestamp:
    Type: String
    Default: 'initial'
    Description: Timestamp to force custom resource re-execution on every deployment

  QuotaPoliciesTableName:
    Type: String
    Default: 'QuotaPolicies'
    Description: Name of the QuotaPolicies DynamoDB table

  UserQuotaMetricsTableName:
    Type: String
    Default: 'UserQuotaMetrics'
    Description: Name of the UserQuotaMetrics DynamoDB table

Conditions:
  IsOkta: !Equals [!Ref IdPProvider, 'okta']
  IsAzure: !Equals [!Ref IdPProvider, 'azure']
  IsAuth0: !Equals [!Ref IdPProvider, 'auth0']
  IsCognito: !Equals [!Ref IdPProvider, 'cognito']
  HasRoute53Zone: !Not [!Equals [!Ref HostedZoneId, '']]
  UseExistingCertificate: !Not [!Equals [!Ref ExistingCertificateArn, '']]
  CreateNewCertificate: !Equals [!Ref ExistingCertificateArn, '']

Resources:
  # S3 Bucket for ALB access logs
  ALBLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${IdentityPoolName}-admin-alb-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: AdminConsoleALBLogs

  ALBLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${ALBLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control
          - Sid: AWSLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ALBLogsBucket.Arn

  # Lambda Execution Role — read/write DynamoDB + Bedrock tag operations
  AdminLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: AdminConsoleDynamoDB
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${QuotaPoliciesTableName}'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${QuotaPoliciesTableName}/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UserQuotaMetricsTableName}'
        - PolicyName: AdminConsoleBedrock
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ListInferenceProfiles
                  - bedrock:ListTagsForResource
                  - bedrock:TagResource
                  - bedrock:DeleteInferenceProfile
                Resource: '*'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  AdminLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${IdentityPoolName}-admin-console'
      RetentionInDays: 30

  AdminFunction:
    Type: AWS::Lambda::Function
    DependsOn: AdminLogGroup
    Properties:
      FunctionName: !Sub '${IdentityPoolName}-admin-console'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt AdminLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          POLICIES_TABLE: !Ref QuotaPoliciesTableName
          QUOTA_TABLE: !Ref UserQuotaMetricsTableName
      Code: ./lambda-functions/admin_console/
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # ALB Security Group
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${IdentityPoolName}-admin-alb-sg'
      GroupDescription: Security group for admin console ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from internet (authenticated access)
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Name
          Value: !Sub '${IdentityPoolName}-admin-alb-sg'

  # Application Load Balancer
  AdminALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: ALBLogsBucketPolicy
    Properties:
      Name: !Sub '${IdentityPoolName}-admin-alb'
      Type: application
      Scheme: !Ref ALBScheme
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref PublicSubnetIds
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref ALBLogsBucket
        - Key: access_logs.s3.prefix
          Value: 'alb'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Target Group for Lambda
  LambdaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LambdaInvokePermission
    Properties:
      Name: !Sub '${IdentityPoolName}-admin-tg'
      TargetType: lambda
      Targets:
        - Id: !GetAtt AdminFunction.Arn
      HealthCheckEnabled: false
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Lambda Invoke Permission for ALB
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com
      SourceArn: !Sub 'arn:aws:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*'

  # ACM Certificate
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: CreateNewCertificate
    Properties:
      DomainName: !Ref CustomDomainName
      ValidationMethod: DNS
      DomainValidationOptions: !If
        - HasRoute53Zone
        - - DomainName: !Ref CustomDomainName
            HostedZoneId: !Ref HostedZoneId
        - !Ref AWS::NoValue
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # HTTPS Listener with OIDC Authentication
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AdminALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !If
            - UseExistingCertificate
            - !Ref ExistingCertificateArn
            - !Ref Certificate
      DefaultActions:
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/v2.0'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/'
                  - !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'
            AuthorizationEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/authorize'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/oauth2/v2.0/authorize'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/authorize'
                  - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize'
            TokenEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/token'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/oauth2/v2.0/token'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/oauth/token'
                  - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
            UserInfoEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/userinfo'
              - !If
                - IsAzure
                - 'https://graph.microsoft.com/oidc/userinfo'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/userinfo'
                  - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/userInfo'
            ClientId: !If
              - IsOkta
              - !Ref OktaClientId
              - !If
                - IsAzure
                - !Ref AzureClientId
                - !If
                  - IsAuth0
                  - !Ref Auth0ClientId
                  - !Ref CognitoClientId
            ClientSecret: !If
              - IsOkta
              - !Sub '{{resolve:secretsmanager:${OktaClientSecretArn}:SecretString}}'
              - !If
                - IsAzure
                - !Sub '{{resolve:secretsmanager:${AzureClientSecretArn}:SecretString}}'
                - !If
                  - IsAuth0
                  - !Sub '{{resolve:secretsmanager:${Auth0ClientSecretArn}:SecretString}}'
                  - !Sub '{{resolve:secretsmanager:${CognitoClientSecretArn}:SecretString}}'
            SessionTimeout: 43200
            Scope: 'openid email profile'
            OnUnauthenticatedRequest: authenticate
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref LambdaTargetGroup

  # Route53 A Record (if custom domain with Route53)
  DomainARecord:
    Type: AWS::Route53::RecordSet
    Condition: HasRoute53Zone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt AdminALB.CanonicalHostedZoneID
        DNSName: !GetAtt AdminALB.DNSName
        EvaluateTargetHealth: false

  # Cognito callback URL updater (same pattern as landing page)
  CognitoCallbackUpdaterRole:
    Type: AWS::IAM::Role
    Condition: IsCognito
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: UpdateCognitoClient
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                Resource:
                  - !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}'

  CognitoCallbackUpdaterFunction:
    Type: AWS::Lambda::Function
    Condition: IsCognito
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CognitoCallbackUpdaterRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          cognito = boto3.client('cognito-idp')

          def handler(event, context):
              logger.info(f"Event: {event}")
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  custom_domain = event['ResourceProperties']['CustomDomain']

                  callback_url = f"https://{custom_domain}/oauth2/idpresponse"
                  logout_url = f"https://{custom_domain}"

                  response = cognito.describe_user_pool_client(UserPoolId=user_pool_id, ClientId=client_id)
                  current_client = response['UserPoolClient']

                  update_params = {
                      'UserPoolId': user_pool_id,
                      'ClientId': client_id,
                      'CallbackURLs': [callback_url],
                      'LogoutURLs': [logout_url],
                  }
                  if 'AllowedOAuthFlows' in current_client:
                      update_params['AllowedOAuthFlows'] = current_client['AllowedOAuthFlows']
                  if 'AllowedOAuthScopes' in current_client:
                      update_params['AllowedOAuthScopes'] = current_client['AllowedOAuthScopes']
                  if 'AllowedOAuthFlowsUserPoolClient' in current_client:
                      update_params['AllowedOAuthFlowsUserPoolClient'] = current_client['AllowedOAuthFlowsUserPoolClient']
                  if 'SupportedIdentityProviders' in current_client and current_client['SupportedIdentityProviders']:
                      update_params['SupportedIdentityProviders'] = current_client['SupportedIdentityProviders']
                  else:
                      update_params['SupportedIdentityProviders'] = ['COGNITO']

                  cognito.update_user_pool_client(**update_params)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'CallbackURL': callback_url})
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  UpdateCognitoCallbackURLs:
    Type: AWS::CloudFormation::CustomResource
    Condition: IsCognito
    DependsOn:
      - AdminALB
      - HTTPSListener
    Properties:
      ServiceToken: !GetAtt CognitoCallbackUpdaterFunction.Arn
      UserPoolId: !Ref CognitoUserPoolId
      ClientId: !Ref CognitoClientId
      CustomDomain: !Ref CustomDomainName
      Version: !Ref DeploymentTimestamp

Outputs:
  AdminConsoleURL:
    Description: Admin console URL (HTTPS with custom domain)
    Value: !Sub 'https://${CustomDomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-AdminConsoleURL'

  IdPRedirectURI:
    Description: Configure this redirect URI in your IdP web application
    Value: !Sub 'https://${CustomDomainName}/oauth2/idpresponse'
    Export:
      Name: !Sub '${AWS::StackName}-IdPRedirectURI'

  CognitoCallbackStatus:
    Condition: IsCognito
    Description: Cognito User Pool Client callback URLs
    Value: !Sub |
      Callback URL: https://${CustomDomainName}/oauth2/idpresponse
      Logout URL: https://${CustomDomainName}
