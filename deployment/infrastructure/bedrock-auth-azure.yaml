AWSTemplateFormatVersion: '2010-09-09'
Description: 'Claude Code with Bedrock - Azure AD (Entra ID) Authentication Stack'

Parameters:
  FederationType:
    Type: String
    Default: direct
    AllowedValues:
      - direct
      - cognito
    Description: Authentication mode - Direct IAM or Cognito Identity Pool

  AzureTenantId:
    Type: String
    Description: Your Azure AD tenant ID (GUID format)
    AllowedPattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
    ConstraintDescription: Must be a valid Azure tenant ID (GUID)

  AzureClientId:
    Type: String
    Description: Azure AD application (client) ID
    AllowedPattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
    ConstraintDescription: Must be a valid Azure client ID (GUID)

  IdentityPoolName:
    Type: String
    Default: claude-code-azure
    Description: Name for the Cognito Identity Pool (used in cognito mode)
    AllowedPattern: '^[\w\s+=,.@-]+$'
    MaxLength: 128

  FederatedRoleName:
    Type: String
    Default: BedrockAzureFederatedRole
    Description: Name for the IAM role used for federation
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-_]*$'
    MaxLength: 64

  AllowedBedrockRegions:
    Type: CommaDelimitedList
    Default: 'us-east-1,us-west-2'
    Description: Comma-delimited list of AWS regions where Bedrock access is allowed

  EnableMonitoring:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable CloudWatch monitoring for Bedrock usage

  InferenceProfilesEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >-
      When true, users can ONLY invoke Bedrock via their own Application Inference Profiles.
      Direct access to foundation models and cross-region inference profiles is denied.

  DashboardStackName:
    Type: String
    Default: ''
    Description: >-
      Stack name of the claude-code-dashboard stack. When InferenceProfilesEnabled=true,
      used to import the InferenceProfileMapping DynamoDB table for the provisioner.

Conditions:
  UseDirectIAM: !Equals [!Ref FederationType, direct]
  UseCognitoIdentity: !Equals [!Ref FederationType, cognito]
  MonitoringEnabled: !Equals [!Ref EnableMonitoring, 'true']
  UseInferenceProfiles: !Equals [!Ref InferenceProfilesEnabled, 'true']
  UseDirectModels: !Not [!Equals [!Ref InferenceProfilesEnabled, 'true']]
  # Partition-aware conditions for Cognito Identity service principals
  HasDashboardStack: !Not [!Equals [!Ref DashboardStackName, '']]
  HasMappingTable: !And [!Condition UseInferenceProfiles, !Condition HasDashboardStack]
  IsGovCloudWest: !Equals [!Ref 'AWS::Region', 'us-gov-west-1']
  IsGovCloudEast: !Equals [!Ref 'AWS::Region', 'us-gov-east-1']
  IsGovCloud: !Or [!Condition IsGovCloudWest, !Condition IsGovCloudEast]

Resources:
  # ===============================================
  # OIDC Provider for Azure AD (Entra ID)
  # ===============================================

  AzureOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Sub 'https://login.microsoftonline.com/${AzureTenantId}/v2.0'
      ClientIdList:
        - !Ref AzureClientId
      ThumbprintList:
        - 626d44e704d1ceabe3bf0d53397464ac8080142c
        - 3a6ee4abbc964291263d9268b89ffadc8dc2d107
      Tags:
        - Key: Purpose
          Value: Claude Code Azure AD Authentication
        - Key: Provider
          Value: Azure

  # ===============================================
  # Bedrock Access Policy (Shared)
  # ===============================================

  BedrockAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for accessing Bedrock services
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # --- Direct model access (only when inference profiles are DISABLED) ---
          - !If
            - UseDirectModels
            - Sid: AllowBedrockInvokeRegional
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                - !Sub 'arn:${AWS::Partition}:bedrock:*:*:inference-profile/*'
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AllowedBedrockRegions
            - !Ref 'AWS::NoValue'
          - !If
            - UseDirectModels
            - Sid: AllowBedrockInvokeGlobal
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:::foundation-model/*'
            - !Ref 'AWS::NoValue'
          - Sid: AllowBedrockListRegional
            Effect: Allow
            Action:
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
              - 'bedrock:GetFoundationModelAvailability'
              - 'bedrock:ListInferenceProfiles'
              - 'bedrock:GetInferenceProfile'
            Resource: '*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref AllowedBedrockRegions
          - Sid: AllowBedrockListGlobal
            Effect: Allow
            Action:
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
              - 'bedrock:GetFoundationModelAvailability'
              - 'bedrock:ListInferenceProfiles'
              - 'bedrock:GetInferenceProfile'
            Resource: '*'
          - Sid: AllowBedrockCallWithBearerToken
            Effect: Allow
            Action:
              - 'bedrock:CallWithBearerToken'
            Resource: '*'
          # --- Application inference profile access (only when inference profiles are ENABLED) ---
          - !If
            - UseInferenceProfiles
            - Sid: AllowBedrockInvokeOwnApplicationProfiles
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AllowedBedrockRegions
                  'aws:ResourceTag/status': 'enabled'
                StringEqualsIgnoreCase:
                  'aws:ResourceTag/user.email': '${aws:PrincipalTag/UserEmail}'
            - !Ref 'AWS::NoValue'
          - !If
            - UseInferenceProfiles
            - Sid: AllowBedrockInvokeFoundationModelViaInferenceProfile
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                # EU cross-region inference profile system ARNs
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-central-1::inference-profile/eu.anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-central-1::inference-profile/eu.anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-central-1::inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0'
                # US cross-region inference profile system ARNs
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-1::inference-profile/us.anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-1::inference-profile/us.anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-1::inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0'
                # EU foundation-model ARNs (destination regions for eu.* profiles)
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-central-1::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-central-1::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-central-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-north-1::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-north-1::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-north-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-south-1::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-south-1::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-south-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-south-2::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-south-2::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-south-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-west-1::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-west-1::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-west-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-west-3::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-west-3::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:eu-west-3::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                # US foundation-model ARNs (destination regions for us.* profiles)
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-1::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-1::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-2::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-2::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-east-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-west-2::foundation-model/anthropic.claude-opus-4-7'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-west-2::foundation-model/anthropic.claude-sonnet-4-6'
                - !Sub 'arn:${AWS::Partition}:bedrock:us-west-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
              Condition:
                StringLike:
                  'bedrock:InferenceProfileArn': !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
            - !Ref 'AWS::NoValue'
          # --- Inference profile provisioner Lambda invocation (only when inference profiles are ENABLED) ---
          - !If
            - UseInferenceProfiles
            - Sid: AllowInvokeInferenceProfileProvisioner
              Effect: Allow
              Action:
                - 'lambda:InvokeFunction'
              Resource: !GetAtt InferenceProfileProvisionerFunction.Arn
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AllowedBedrockRegions
            - !Ref 'AWS::NoValue'
          # --- Self-assume for session tag injection (Cognito + inference profiles) ---
          - !If
            - UseInferenceProfiles
            - Sid: AllowSelfAssumeWithTags
              Effect: Allow
              Action:
                - 'sts:AssumeRole'
                - 'sts:TagSession'
              Resource:
                - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-*'
            - !Ref 'AWS::NoValue'
          - Sid: AllowMarketplaceSubscriptions
            Effect: Allow
            Action:
              - 'aws-marketplace:ViewSubscriptions'
              - 'aws-marketplace:Subscribe'
            Resource: '*'
          - !If
            - MonitoringEnabled
            - Sid: AllowCloudWatchMetrics
              Effect: Allow
              Action:
                - 'cloudwatch:PutMetricData'
              Resource: '*'
              Condition:
                StringEquals:
                  'cloudwatch:namespace':
                    - 'ClaudeCode/Bedrock/Usage'
                    - 'AWS/Bedrock'
            - !Ref 'AWS::NoValue'

  # ===============================================
  # Direct IAM Resources (when FederationType=direct)
  # ===============================================

  DirectIAMRole:
    Type: AWS::IAM::Role
    Condition: UseDirectIAM
    Properties:
      RoleName: !Ref FederatedRoleName
      Description: Direct IAM role for Azure AD users accessing Bedrock
      MaxSessionDuration: 43200  # 12 hours
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt AzureOIDCProvider.Arn
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
              - 'sts:TagSession'
      ManagedPolicyArns:
        - !Ref BedrockAccessPolicy
      Tags:
        - Key: Purpose
          Value: Claude Code Direct IAM Authentication
        - Key: Provider
          Value: Azure
        - Key: FederationType
          Value: direct

  # ===============================================
  # Cognito Identity Pool Resources (when FederationType=cognito)
  # ===============================================

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Condition: UseCognitoIdentity
    Properties:
      IdentityPoolName: !Ref IdentityPoolName
      AllowUnauthenticatedIdentities: false
      AllowClassicFlow: true
      OpenIdConnectProviderARNs:
        - !GetAtt AzureOIDCProvider.Arn

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Condition: UseCognitoIdentity
    Properties:
      Description: Role for authenticated Cognito Identity Pool users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - IsGovCloudWest
                - cognito-identity-us-gov.amazonaws.com
                - !If
                  - IsGovCloudEast
                  - cognito-identity.us-gov-east-1.amazonaws.com
                  - cognito-identity.amazonaws.com
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
              - 'sts:TagSession'
            Condition:
              StringEquals:
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:aud': !Ref CognitoIdentityPool
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:aud': !Ref CognitoIdentityPool
                    - 'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:amr': authenticated
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:amr': authenticated
                    - 'cognito-identity.amazonaws.com:amr': authenticated
          # Self-assume: allows role chaining with explicit session tags
          # Cognito PrincipalTags don't work with external OIDC providers, so
          # credential-process chains: Cognito creds -> AssumeRole(self, Tags) -> tagged session
          - !If
            - UseInferenceProfiles
            - Effect: Allow
              Principal:
                AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
              Action:
                - 'sts:AssumeRole'
                - 'sts:TagSession'
              Condition:
                ArnLike:
                  'aws:PrincipalArn': !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-*'
            - !Ref 'AWS::NoValue'
      ManagedPolicyArns:
        - !Ref BedrockAccessPolicy
      Tags:
        - Key: Purpose
          Value: Claude Code Cognito Authentication
        - Key: Provider
          Value: Azure

  CognitoUnauthenticatedRole:
    Type: AWS::IAM::Role
    Condition: UseCognitoIdentity
    Properties:
      Description: Role for unauthenticated Cognito Identity Pool users (restricted)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - IsGovCloudWest
                - cognito-identity-us-gov.amazonaws.com
                - !If
                  - IsGovCloudEast
                  - cognito-identity.us-gov-east-1.amazonaws.com
                  - cognito-identity.amazonaws.com
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:aud': !Ref CognitoIdentityPool
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:aud': !Ref CognitoIdentityPool
                    - 'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:amr': unauthenticated
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:amr': unauthenticated
                    - 'cognito-identity.amazonaws.com:amr': unauthenticated
      Policies:
        - PolicyName: DenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: '*'
                Resource: '*'
      Tags:
        - Key: Purpose
          Value: Claude Code Cognito Unauthenticated Role
        - Key: Provider
          Value: Azure

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Condition: UseCognitoIdentity
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn
        unauthenticated: !GetAtt CognitoUnauthenticatedRole.Arn

  # Principal Tag Mapping for Session Tags
  IdentityPoolPrincipalTag:
    Type: AWS::Cognito::IdentityPoolPrincipalTag
    Condition: UseCognitoIdentity
    DeletionPolicy: Delete
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      IdentityProviderName: !Sub 'login.microsoftonline.com/${AzureTenantId}/v2.0'
      UseDefaults: false
      PrincipalTags:
        UserEmail: email
        UserId: sub
        UserName: name

  # ===============================================
  # Inference Profile Provisioner Lambda
  # ===============================================

  InferenceProfileProvisionerRole:
    Type: AWS::IAM::Role
    Condition: UseInferenceProfiles
    Properties:
      Description: Execution role for the inference profile provisioner Lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockProfileProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowCreateInferenceProfile
                Effect: Allow
                Action:
                  - 'bedrock:CreateInferenceProfile'
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::inference-profile/*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedBedrockRegions
              - Sid: AllowTagInferenceProfile
                Effect: Allow
                Action:
                  - 'bedrock:TagResource'
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedBedrockRegions
              - Sid: AllowListGetInferenceProfiles
                Effect: Allow
                Action:
                  - 'bedrock:ListInferenceProfiles'
                  - 'bedrock:GetInferenceProfile'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedBedrockRegions
        - !If
          - HasMappingTable
          - PolicyName: InferenceProfileMappingWrite
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - 'dynamodb:PutItem'
                    - 'dynamodb:BatchWriteItem'
                  Resource:
                    - !ImportValue
                        Fn::Sub: '${DashboardStackName}-InferenceProfileMappingTableArn'
          - !Ref 'AWS::NoValue'
        - PolicyName: SSMReadUserGroups
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/claude-code/user-groups'
      Tags:
        - Key: Purpose
          Value: Claude Code Inference Profile Provisioner

  InferenceProfileModelsParameter:
    Type: AWS::SSM::Parameter
    Condition: UseInferenceProfiles
    Properties:
      Name: '/claude-code/inference-profile-models'
      Type: String
      Description: >-
        JSON configuration for Bedrock inference profile models.
        Update this parameter to add/remove/change models without redeploying the Lambda.
      Value: !Sub |
        {
          "opus-4-7":   {"cross_region_profile_id": "{geo}.anthropic.claude-opus-4-7",             "enabled": true},
          "sonnet-4-6": {"cross_region_profile_id": "{geo}.anthropic.claude-sonnet-4-6",           "enabled": true},
          "haiku-4-5":  {"cross_region_profile_id": "{geo}.anthropic.claude-haiku-4-5-20251001-v1:0", "enabled": true}
        }
      Tags:
        Purpose: Claude Code Inference Profile Models

  UserGroupsParameter:
    Type: AWS::SSM::Parameter
    Condition: UseInferenceProfiles
    Properties:
      Name: '/claude-code/user-groups'
      Type: String
      Description: >-
        Mapping of Entra ID group GUIDs to group names for Claude Code access tiers.
        Update this parameter to add/remove groups without redeploying the Lambda.
      Value: |
        {
          "9f0c1c65-3a5b-497c-b0cb-35aa6a20e2b1": "AWSClaudeCodePowerUsers",
          "cd356a8c-3361-4a27-b855-3b2c9b831da9": "AWSClaudeCodeStandardUsers",
          "aa191b61-f9dd-44ce-a251-c7c244ddb902": "AWSClaudeCodeBasicUsers"
        }
      Tags:
        Purpose: Claude Code User Group Mapping

  InferenceProfileProvisionerLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: UseInferenceProfiles
    Properties:
      LogGroupName: '/aws/lambda/ClaudeCode-InferenceProfileProvisioner'
      RetentionInDays: 30

  InferenceProfileProvisionerFunction:
    Type: AWS::Lambda::Function
    Condition: UseInferenceProfiles
    DependsOn: InferenceProfileProvisionerLogGroup
    Properties:
      FunctionName: 'ClaudeCode-InferenceProfileProvisioner'
      Description: >-
        Provisions per-user Bedrock Application Inference Profiles.
        Model config from SSM /claude-code/inference-profile-models.
        Resolves user groups from JWT via SSM /claude-code/user-groups.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt InferenceProfileProvisionerRole.Arn
      Timeout: 60
      MemorySize: 128
      LoggingConfig:
        LogGroup: '/aws/lambda/ClaudeCode-InferenceProfileProvisioner'
      Environment:
        Variables:
          INFERENCE_PROFILE_MODELS_JSON: !GetAtt InferenceProfileModelsParameter.Value
          INFERENCE_PROFILE_MAPPING_TABLE: !If
            - HasMappingTable
            - !ImportValue
                Fn::Sub: '${DashboardStackName}-InferenceProfileMappingTableName'
            - ''
      Code:
        ZipFile: |
          import json, logging, os, re, hashlib, boto3
          from datetime import datetime, timezone
          from botocore.exceptions import ClientError
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          _EU_REGIONS = {"eu-west-1","eu-west-2","eu-west-3","eu-central-1","eu-central-2","eu-north-1","eu-south-1","eu-south-2"}
          def _load_models():
            raw = os.environ.get("INFERENCE_PROFILE_MODELS_JSON", "{}")
            try:
              return json.loads(raw)
            except json.JSONDecodeError as e:
              logger.error("Failed to parse INFERENCE_PROFILE_MODELS_JSON: %s", e)
              return {}
          INFERENCE_PROFILE_MODELS = _load_models()
          logger.info("Loaded %d model(s) from config: %s", len(INFERENCE_PROFILE_MODELS), list(INFERENCE_PROFILE_MODELS.keys()))
          _MAX_TAG_VALUE = 256
          _EMAIL_RE = re.compile(r"^[^@\s]+@[^@\s]+\.[^@\s]+$")
          _MAPPING_TABLE = None
          _USER_GROUPS_MAP = None
          def _get_mapping_table():
            global _MAPPING_TABLE
            if _MAPPING_TABLE is None:
              name = os.environ.get("INFERENCE_PROFILE_MAPPING_TABLE")
              if name:
                _MAPPING_TABLE = boto3.resource("dynamodb").Table(name)
            return _MAPPING_TABLE
          def _get_user_groups_map():
            global _USER_GROUPS_MAP
            if _USER_GROUPS_MAP is None:
              ssm = boto3.client("ssm")
              try:
                resp = ssm.get_parameter(Name="/claude-code/user-groups")
                _USER_GROUPS_MAP = json.loads(resp["Parameter"]["Value"])
                logger.info("Loaded %d group(s) from SSM", len(_USER_GROUPS_MAP))
              except Exception as e:
                logger.warning("Could not load user groups from SSM: %s", e)
                _USER_GROUPS_MAP = {}
            return _USER_GROUPS_MAP
          def _resolve_groups(jwt_groups):
            if not jwt_groups: return []
            groups_map = _get_user_groups_map()
            if not groups_map: return []
            return [groups_map[gid] for gid in jwt_groups if gid in groups_map]
          def _model_name(mk):
            e = INFERENCE_PROFILE_MODELS.get(mk, {})
            crid = e.get("cross_region_profile_id", "")
            n = crid.split(".")[-1] if "." in crid else mk
            for sfx in ["-v1:0","-v2:0","-v1","-v2"]:
              if sfx in n: n = n[:n.rfind(sfx)]; break
            return re.sub(r"-\d{8}$", "", n)
          def _write_mapping(arns, email, groups):
            tbl = _get_mapping_table()
            if not tbl: return
            now = datetime.now(timezone.utc).isoformat()
            for mk, arn in arns.items():
              try:
                item = {"profileArn":arn,"email":email.lower(),"model":_model_name(mk),"modelKey":mk,"profileId":arn.split("/")[-1],"createdAt":now}
                if groups: item["groups"] = groups
                tbl.put_item(Item=item)
              except Exception as e: logger.warning("Could not write mapping for '%s': %s", mk, e)
          def _geo(region): return "eu" if region in _EU_REGIONS else "us"
          def _source_arn(model_key, region):
            e = INFERENCE_PROFILE_MODELS[model_key]
            pid = e["cross_region_profile_id"].format(geo=_geo(region))
            return f"arn:aws:bedrock:{region}::inference-profile/{pid}"
          def _profile_name(email, model_key):
            email = email.lower()
            h = hashlib.sha256(email.encode()).hexdigest()[:8]
            s = re.sub(r"-{2,}", "-", re.sub(r"[^a-z0-9-]", "-", email)).strip("-")
            suffix = f"-{h}-{model_key}"
            return f"claude-code-{s[:64-12-len(suffix)]}{suffix}"
          def _tags(email, claims, groups):
            tags = [{"key":"user.email","value":email.lower()[:_MAX_TAG_VALUE]},{"key":"status","value":"enabled"}]
            for ck, tk in [("custom:cost_center","cost_center"),("custom:department","department"),("custom:organization","organization"),("custom:team","team")]:
              v = claims.get(ck)
              if v: tags.append({"key":tk,"value":str(v)[:_MAX_TAG_VALUE]})
            if groups: tags.append({"key":"user.group","value":groups[0][:_MAX_TAG_VALUE]})
            return tags
          def handler(event, context):
            if not INFERENCE_PROFILE_MODELS:
              logger.error("No models configured - check INFERENCE_PROFILE_MODELS_JSON env var")
              return {"statusCode":500,"body":json.dumps({"error":"No models configured"})}
            region = boto3.session.Session().region_name
            bedrock = boto3.client("bedrock", region_name=region)
            email = (event.get("email") or "").strip()
            if not email or not _EMAIL_RE.match(email):
              logger.error("Invalid or missing email: %r", email)
              return {"statusCode":400,"body":json.dumps({"error":"Invalid or missing email in payload"})}
            claims = event.get("claims") or {}
            jwt_groups = event.get("groups") or claims.get("groups") or []
            groups = _resolve_groups(jwt_groups)
            if groups: logger.info("Resolved groups for %s: %s", email, groups)
            tags = _tags(email, claims, groups)
            arns = {}
            enabled = {k:v for k,v in INFERENCE_PROFILE_MODELS.items() if v.get("enabled")}
            expected = {_profile_name(email, mk): mk for mk in enabled}
            try:
              pg = bedrock.get_paginator("list_inference_profiles")
              for page in pg.paginate(typeEquals="APPLICATION"):
                for p in page.get("inferenceProfileSummaries",[]):
                  pn = p.get("inferenceProfileName","")
                  if pn in expected:
                    arns[expected[pn]] = p["inferenceProfileArn"]
                    logger.info("Found existing '%s': %s", expected[pn], p["inferenceProfileArn"])
            except Exception as e: logger.warning("Could not list profiles: %s", e)
            if all(mk in arns for mk in enabled):
              logger.info("All %d profiles exist for %s", len(arns), email)
              _write_mapping(arns, email, groups)
              return {"statusCode":200,"body":json.dumps({"profile_arns":arns,"groups":groups})}
            for mk in enabled:
              if mk in arns: continue
              pname = _profile_name(email, mk)
              logger.info("Creating profile '%s' for '%s'", pname, mk)
              try:
                r = bedrock.create_inference_profile(inferenceProfileName=pname, description="Claude Code inference profile", modelSource={"copyFrom":_source_arn(mk,region)}, tags=tags)
                arns[mk] = r["inferenceProfileArn"]
                logger.info("Created '%s': %s", mk, arns[mk])
              except ClientError as e: logger.warning("Could not create profile for '%s': %s", mk, e)
              except Exception as e: logger.warning("Unexpected error for '%s': %s", mk, e)
            _write_mapping(arns, email, groups)
            logger.info("Returning %d ARN(s) for %s", len(arns), email)
            return {"statusCode":200,"body":json.dumps({"profile_arns":arns,"groups":groups})}
      Tags:
        - Key: Purpose
          Value: Claude Code Inference Profile Provisioner

  # ===============================================
  # Optional Monitoring Resources
  # ===============================================

  BedrockAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: MonitoringEnabled
    Properties:
      LogGroupName: !Sub '/aws/bedrock/claude-code-${AWS::StackName}'
      RetentionInDays: 30

Outputs:
  FederationType:
    Description: Current federation type configuration
    Value: !Ref FederationType
    Export:
      Name: !Sub '${AWS::StackName}-FederationType'

  OIDCProviderArn:
    Description: ARN of the Azure AD OIDC Provider
    Value: !GetAtt AzureOIDCProvider.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderArn'

  FederatedRoleArn:
    Description: ARN of the federated role for Azure AD users
    Value: !If
      - UseDirectIAM
      - !GetAtt DirectIAMRole.Arn
      - !GetAtt CognitoAuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FederatedRoleArn'

  DirectSTSRoleArn:
    Description: Direct STS federated role ARN (when using direct IAM)
    Condition: UseDirectIAM
    Value: !GetAtt DirectIAMRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DirectSTSRoleArn'

  BedrockRoleArn:
    Description: IAM Role ARN for Bedrock access (for backward compatibility)
    Value: !If
      - UseDirectIAM
      - !GetAtt DirectIAMRole.Arn
      - !GetAtt CognitoAuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockRoleArn'

  IdentityPoolId:
    Description: Cognito Identity Pool ID (if using Cognito mode)
    Condition: UseCognitoIdentity
    Value: !Ref CognitoIdentityPool
    Export:
      Name: !Sub '${AWS::StackName}-IdentityPoolId'

  BedrockPolicyArn:
    Description: ARN of the Bedrock access policy
    Value: !Ref BedrockAccessPolicy
    Export:
      Name: !Sub '${AWS::StackName}-BedrockPolicyArn'

  InferenceProfileProvisionerArn:
    Description: ARN of the inference profile provisioner Lambda
    Condition: UseInferenceProfiles
    Value: !GetAtt InferenceProfileProvisionerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InferenceProfileProvisionerArn'

  ConfigurationJson:
    Description: Configuration JSON for CLI tool
    Value: !If
      - UseDirectIAM
      - !Sub |
        {
          "federation_type": "direct",
          "provider_type": "azure",
          "azure_tenant_id": "${AzureTenantId}",
          "client_id": "${AzureClientId}",
          "federated_role_arn": "${DirectIAMRole.Arn}",
          "aws_region": "${AWS::Region}",
          "max_session_duration": 43200,
          "inference_profiles_enabled": ${InferenceProfilesEnabled},
          "inference_profiles_provisioner_arn": "${InferenceProfileProvisionerFunction.Arn}"
        }
      - !Sub |
        {
          "federation_type": "cognito",
          "provider_type": "azure",
          "azure_tenant_id": "${AzureTenantId}",
          "client_id": "${AzureClientId}",
          "identity_pool_id": "${CognitoIdentityPool}",
          "federated_role_arn": "${CognitoAuthenticatedRole.Arn}",
          "aws_region": "${AWS::Region}",
          "inference_profiles_enabled": ${InferenceProfilesEnabled},
          "inference_profiles_provisioner_arn": "${InferenceProfileProvisionerFunction.Arn}"
        }
