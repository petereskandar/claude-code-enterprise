AWSTemplateFormatVersion: '2010-09-09'
Description: 'Claude Code with Bedrock - Okta Authentication Stack'

Parameters:
  FederationType:
    Type: String
    Default: direct
    AllowedValues:
      - direct
      - cognito
    Description: Authentication mode - Direct IAM or Cognito Identity Pool

  OktaDomain:
    Type: String
    Description: Your Okta domain (e.g., company.okta.com)
    AllowedPattern: '^[a-zA-Z0-9][a-zA-Z0-9-]*\.okta(-emea)?\.com$'
    ConstraintDescription: Must be a valid Okta domain

  OktaClientId:
    Type: String
    Description: Okta application client ID
    AllowedPattern: '^[a-zA-Z0-9]{20}$'
    ConstraintDescription: Must be a valid Okta client ID

  IdentityPoolName:
    Type: String
    Default: claude-code-okta
    Description: Name for the Cognito Identity Pool (used in cognito mode)
    AllowedPattern: '^[\w\s+=,.@-]+$'
    MaxLength: 128

  FederatedRoleName:
    Type: String
    Default: BedrockOktaFederatedRole
    Description: Name for the IAM role used for federation
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-_]*$'
    MaxLength: 64

  AllowedBedrockRegions:
    Type: CommaDelimitedList
    Default: 'us-east-1,us-west-2'
    Description: Comma-delimited list of AWS regions where Bedrock access is allowed

  EnableMonitoring:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable CloudWatch monitoring for Bedrock usage

  InferenceProfilesEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >-
      When true, users can ONLY invoke Bedrock via their own Application Inference Profiles.
      Direct access to foundation models and cross-region inference profiles is denied.

Conditions:
  UseDirectIAM: !Equals [!Ref FederationType, direct]
  UseCognitoIdentity: !Equals [!Ref FederationType, cognito]
  MonitoringEnabled: !Equals [!Ref EnableMonitoring, 'true']
  UseInferenceProfiles: !Equals [!Ref InferenceProfilesEnabled, 'true']
  UseDirectModels: !Not [!Equals [!Ref InferenceProfilesEnabled, 'true']]
  # Partition-aware conditions for Cognito Identity service principals
  IsGovCloudWest: !Equals [!Ref 'AWS::Region', 'us-gov-west-1']
  IsGovCloudEast: !Equals [!Ref 'AWS::Region', 'us-gov-east-1']
  IsGovCloud: !Or [!Condition IsGovCloudWest, !Condition IsGovCloudEast]

Resources:
  # ===============================================
  # OIDC Provider for Okta
  # ===============================================

  OktaOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Sub 'https://${OktaDomain}'
      ClientIdList:
        - !Ref OktaClientId
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280  # Okta's thumbprint
      Tags:
        - Key: Purpose
          Value: Claude Code Okta Authentication
        - Key: Provider
          Value: Okta

  # ===============================================
  # Bedrock Access Policy (Shared)
  # ===============================================

  BedrockAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for accessing Bedrock services
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowBedrockInvokeRegional
            Effect: Allow
            Action:
              - 'bedrock:InvokeModel'
              - 'bedrock:InvokeModelWithResponseStream'
              - 'bedrock-runtime:InvokeModel'
              - 'bedrock-runtime:InvokeModelWithResponseStream'
              - 'bedrock-runtime:ConverseStream'
              - 'bedrock-runtime:Converse'
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
              - !Sub 'arn:${AWS::Partition}:bedrock:*:*:inference-profile/*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref AllowedBedrockRegions
          - Sid: AllowBedrockInvokeGlobal
            Effect: Allow
            Action:
              - 'bedrock:InvokeModel'
              - 'bedrock:InvokeModelWithResponseStream'
              - 'bedrock-runtime:InvokeModel'
              - 'bedrock-runtime:InvokeModelWithResponseStream'
              - 'bedrock-runtime:ConverseStream'
              - 'bedrock-runtime:Converse'
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:::foundation-model/*'
          - Sid: AllowBedrockListRegional
            Effect: Allow
            Action:
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
              - 'bedrock:GetFoundationModelAvailability'
              - 'bedrock:ListInferenceProfiles'
              - 'bedrock:GetInferenceProfile'
            Resource: '*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref AllowedBedrockRegions
          - Sid: AllowBedrockListGlobal
            Effect: Allow
            Action:
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
              - 'bedrock:GetFoundationModelAvailability'
              - 'bedrock:ListInferenceProfiles'
              - 'bedrock:GetInferenceProfile'
            Resource: '*'
          - !If
            - UseInferenceProfiles
            - Sid: AllowBedrockInvokeOwnApplicationProfiles
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AllowedBedrockRegions
                  # TEMPORARY: user.email ABAC condition removed — Okta Org Auth Server
                  # does not support the https://aws.amazon.com/tags JWT claim needed for
                  # PrincipalTag propagation via direct OIDC federation.
                  # Re-enable when switching to Entra ID:
                  #   'aws:ResourceTag/user.email': '${aws:PrincipalTag/UserEmail}'
                  # Quota enforcement: only allow invocation when profile is tagged status=enabled
                  'aws:ResourceTag/status': 'enabled'
            - !Ref 'AWS::NoValue'
          - !If
            - UseInferenceProfiles
            - Sid: AllowInvokeInferenceProfileProvisioner
              Effect: Allow
              Action:
                - 'lambda:InvokeFunction'
              Resource: !GetAtt InferenceProfileProvisionerFunction.Arn
            - !Ref 'AWS::NoValue'
          - Sid: AllowMarketplaceSubscriptions
            Effect: Allow
            Action:
              - 'aws-marketplace:ViewSubscriptions'
              - 'aws-marketplace:Subscribe'
            Resource: '*'
          - !If
            - MonitoringEnabled
            - Sid: AllowCloudWatchMetrics
              Effect: Allow
              Action:
                - 'cloudwatch:PutMetricData'
              Resource: '*'
              Condition:
                StringEquals:
                  'cloudwatch:namespace':
                    - 'ClaudeCode/Bedrock/Usage'
                    - 'AWS/Bedrock'
            - !Ref 'AWS::NoValue'

  # ===============================================
  # Direct IAM Resources (when FederationType=direct)
  # ===============================================

  DirectIAMRole:
    Type: AWS::IAM::Role
    Condition: UseDirectIAM
    Properties:
      RoleName: !Ref FederatedRoleName
      Description: Direct IAM role for Okta users accessing Bedrock
      MaxSessionDuration: 43200  # 12 hours
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt OktaOIDCProvider.Arn
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
              - 'sts:TagSession'
      ManagedPolicyArns:
        - !Ref BedrockAccessPolicy
      Tags:
        - Key: Purpose
          Value: Claude Code Direct IAM Authentication
        - Key: Provider
          Value: Okta
        - Key: FederationType
          Value: direct

  # ===============================================
  # Cognito Identity Pool Resources (when FederationType=cognito)
  # ===============================================

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Condition: UseCognitoIdentity
    Properties:
      IdentityPoolName: !Ref IdentityPoolName
      AllowUnauthenticatedIdentities: false
      AllowClassicFlow: false
      OpenIdConnectProviderARNs:
        - !GetAtt OktaOIDCProvider.Arn

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Condition: UseCognitoIdentity
    Properties:
      Description: Role for authenticated Cognito Identity Pool users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - IsGovCloudWest
                - cognito-identity-us-gov.amazonaws.com
                - !If
                  - IsGovCloudEast
                  - cognito-identity.us-gov-east-1.amazonaws.com
                  - cognito-identity.amazonaws.com
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:aud': !Ref CognitoIdentityPool
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:aud': !Ref CognitoIdentityPool
                    - 'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:amr': authenticated
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:amr': authenticated
                    - 'cognito-identity.amazonaws.com:amr': authenticated
      ManagedPolicyArns:
        - !Ref BedrockAccessPolicy
      Tags:
        - Key: Purpose
          Value: Claude Code Cognito Authentication
        - Key: Provider
          Value: Okta

  CognitoUnauthenticatedRole:
    Type: AWS::IAM::Role
    Condition: UseCognitoIdentity
    Properties:
      Description: Role for unauthenticated Cognito Identity Pool users (restricted)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - IsGovCloudWest
                - cognito-identity-us-gov.amazonaws.com
                - !If
                  - IsGovCloudEast
                  - cognito-identity.us-gov-east-1.amazonaws.com
                  - cognito-identity.amazonaws.com
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:aud': !Ref CognitoIdentityPool
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:aud': !Ref CognitoIdentityPool
                    - 'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:amr': unauthenticated
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:amr': unauthenticated
                    - 'cognito-identity.amazonaws.com:amr': unauthenticated
      Policies:
        - PolicyName: DenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: '*'
                Resource: '*'
      Tags:
        - Key: Purpose
          Value: Claude Code Cognito Unauthenticated Role
        - Key: Provider
          Value: Okta

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Condition: UseCognitoIdentity
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn
        unauthenticated: !GetAtt CognitoUnauthenticatedRole.Arn

  # Principal Tag Mapping for Session Tags
  IdentityPoolPrincipalTag:
    Type: AWS::Cognito::IdentityPoolPrincipalTag
    Condition: UseCognitoIdentity
    DeletionPolicy: Delete
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      IdentityProviderName: !Ref OktaDomain
      UseDefaults: false
      PrincipalTags:
        UserEmail: email
        UserId: sub
        UserName: name

  # ===============================================
  # Inference Profile Provisioner Lambda
  # ===============================================

  InferenceProfileProvisionerRole:
    Type: AWS::IAM::Role
    Condition: UseInferenceProfiles
    Properties:
      Description: Execution role for the inference profile provisioner Lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockProfileProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowCreateInferenceProfile
                Effect: Allow
                Action:
                  - 'bedrock:CreateInferenceProfile'
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                  - !Sub 'arn:${AWS::Partition}:bedrock:*::inference-profile/*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedBedrockRegions
              - Sid: AllowTagInferenceProfile
                Effect: Allow
                Action:
                  - 'bedrock:TagResource'
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:application-inference-profile/*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedBedrockRegions
              - Sid: AllowListGetInferenceProfiles
                Effect: Allow
                Action:
                  - 'bedrock:ListInferenceProfiles'
                  - 'bedrock:GetInferenceProfile'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedBedrockRegions
      Tags:
        - Key: Purpose
          Value: Claude Code Inference Profile Provisioner

  InferenceProfileProvisionerLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: UseInferenceProfiles
    Properties:
      LogGroupName: '/aws/lambda/ClaudeCode-InferenceProfileProvisioner'
      RetentionInDays: 30

  InferenceProfileProvisionerFunction:
    Type: AWS::Lambda::Function
    Condition: UseInferenceProfiles
    DependsOn: InferenceProfileProvisionerLogGroup
    Properties:
      FunctionName: 'ClaudeCode-InferenceProfileProvisioner'
      Description: >-
        Provisions Bedrock Application Inference Profiles for authenticated users.
        Sole principal with bedrock:CreateInferenceProfile — users invoke this instead
        of calling the Bedrock management plane directly.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt InferenceProfileProvisionerRole.Arn
      Timeout: 60
      MemorySize: 128
      LoggingConfig:
        LogGroup: '/aws/lambda/ClaudeCode-InferenceProfileProvisioner'
      Code:
        ZipFile: |
          import json, logging, re, hashlib, boto3
          from botocore.exceptions import ClientError
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          _EU_REGIONS = {"eu-west-1","eu-west-2","eu-west-3","eu-central-1","eu-central-2","eu-north-1","eu-south-1","eu-south-2"}
          INFERENCE_PROFILE_MODELS = {
            "opus-4-6":  {"cross_region_profile_id": "{geo}.anthropic.claude-opus-4-6-v1",            "enabled": True},
            "sonnet-4-6":{"cross_region_profile_id": "{geo}.anthropic.claude-sonnet-4-6",             "enabled": True},
            "haiku-4-5": {"cross_region_profile_id": "{geo}.anthropic.claude-haiku-4-5-20251001-v1:0","enabled": True},
          }
          _MAX_TAG_VALUE = 256
          _EMAIL_RE = re.compile(r"^[^@\s]+@[^@\s]+\.[^@\s]+$")
          def _geo(region): return "eu" if region in _EU_REGIONS else "us"
          def _source_arn(model_key, region):
            e = INFERENCE_PROFILE_MODELS[model_key]
            pid = e["cross_region_profile_id"].format(geo=_geo(region))
            return f"arn:aws:bedrock:{region}::inference-profile/{pid}"
          def _profile_name(email, model_key):
            h = hashlib.sha256(email.encode()).hexdigest()[:8]
            s = re.sub(r"-{2,}", "-", re.sub(r"[^a-z0-9-]", "-", email.lower())).strip("-")
            suffix = f"-{h}-{model_key}"
            return f"claude-code-{s[:64-12-len(suffix)]}{suffix}"
          def _tags(email, claims):
            tags = [{"key":"user.email","value":email[:_MAX_TAG_VALUE]},{"key":"status","value":"enabled"}]
            for ck, tk in [("custom:cost_center","cost_center"),("custom:department","department"),("custom:organization","organization"),("custom:team","team")]:
              v = claims.get(ck)
              if v: tags.append({"key":tk,"value":str(v)[:_MAX_TAG_VALUE]})
            return tags
          def handler(event, context):
            region = boto3.session.Session().region_name
            bedrock = boto3.client("bedrock", region_name=region)
            email = (event.get("email") or "").strip()
            if not email or not _EMAIL_RE.match(email):
              logger.error("Invalid or missing email: %r", email)
              return {"statusCode":400,"body":json.dumps({"error":"Invalid or missing email in payload"})}
            claims = event.get("claims") or {}
            tags = _tags(email, claims)
            arns = {}
            enabled = {k:v for k,v in INFERENCE_PROFILE_MODELS.items() if v.get("enabled")}
            expected = {_profile_name(email, mk): mk for mk in enabled}
            try:
              pg = bedrock.get_paginator("list_inference_profiles")
              for page in pg.paginate(typeEquals="APPLICATION"):
                for p in page.get("inferenceProfileSummaries",[]):
                  pn = p.get("inferenceProfileName","")
                  if pn in expected:
                    arns[expected[pn]] = p["inferenceProfileArn"]
                    logger.info("Found existing '%s': %s", expected[pn], p["inferenceProfileArn"])
            except Exception as e: logger.warning("Could not list profiles: %s", e)
            if all(mk in arns for mk in enabled):
              logger.info("All %d profiles exist for %s", len(arns), email)
              return {"statusCode":200,"body":json.dumps({"profile_arns":arns})}
            for mk in enabled:
              if mk in arns: continue
              pname = _profile_name(email, mk)
              logger.info("Creating profile '%s' for '%s'", pname, mk)
              try:
                r = bedrock.create_inference_profile(inferenceProfileName=pname, description="Claude Code inference profile", modelSource={"copyFrom":_source_arn(mk,region)}, tags=tags)
                arns[mk] = r["inferenceProfileArn"]
                logger.info("Created '%s': %s", mk, arns[mk])
              except ClientError as e: logger.warning("Could not create profile for '%s': %s", mk, e)
              except Exception as e: logger.warning("Unexpected error for '%s': %s", mk, e)
            logger.info("Returning %d ARN(s) for %s", len(arns), email)
            return {"statusCode":200,"body":json.dumps({"profile_arns":arns})}
      Tags:
        - Key: Purpose
          Value: Claude Code Inference Profile Provisioner

  # ===============================================
  # Optional Monitoring Resources
  # ===============================================

  BedrockAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: MonitoringEnabled
    Properties:
      LogGroupName: !Sub '/aws/bedrock/claude-code-${AWS::StackName}'
      RetentionInDays: 30

Outputs:
  FederationType:
    Description: Current federation type configuration
    Value: !Ref FederationType
    Export:
      Name: !Sub '${AWS::StackName}-FederationType'

  OIDCProviderArn:
    Description: ARN of the Okta OIDC Provider
    Value: !GetAtt OktaOIDCProvider.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderArn'

  FederatedRoleArn:
    Description: ARN of the federated role for Okta users
    Value: !If
      - UseDirectIAM
      - !GetAtt DirectIAMRole.Arn
      - !GetAtt CognitoAuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FederatedRoleArn'

  DirectSTSRoleArn:
    Description: Direct STS federated role ARN (when using direct IAM)
    Condition: UseDirectIAM
    Value: !GetAtt DirectIAMRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DirectSTSRoleArn'

  BedrockRoleArn:
    Description: IAM Role ARN for Bedrock access (for backward compatibility)
    Value: !If
      - UseDirectIAM
      - !GetAtt DirectIAMRole.Arn
      - !GetAtt CognitoAuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockRoleArn'

  IdentityPoolId:
    Description: Cognito Identity Pool ID (if using Cognito mode)
    Condition: UseCognitoIdentity
    Value: !Ref CognitoIdentityPool
    Export:
      Name: !Sub '${AWS::StackName}-IdentityPoolId'

  BedrockPolicyArn:
    Description: ARN of the Bedrock access policy
    Value: !Ref BedrockAccessPolicy
    Export:
      Name: !Sub '${AWS::StackName}-BedrockPolicyArn'

  InferenceProfileProvisionerArn:
    Description: ARN of the inference profile provisioner Lambda
    Condition: UseInferenceProfiles
    Value: !GetAtt InferenceProfileProvisionerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InferenceProfileProvisionerArn'

  ConfigurationJson:
    Description: Configuration JSON for CLI tool
    Value: !If
      - UseDirectIAM
      - !Sub |
        {
          "federation_type": "direct",
          "provider_type": "okta",
          "provider_domain": "${OktaDomain}",
          "client_id": "${OktaClientId}",
          "federated_role_arn": "${DirectIAMRole.Arn}",
          "aws_region": "${AWS::Region}",
          "max_session_duration": 43200,
          "inference_profiles_enabled": ${InferenceProfilesEnabled},
          "inference_profiles_provisioner_arn": "${InferenceProfileProvisionerFunction.Arn}"
        }
      - !Sub |
        {
          "federation_type": "cognito",
          "provider_type": "okta",
          "provider_domain": "${OktaDomain}",
          "client_id": "${OktaClientId}",
          "identity_pool_id": "${CognitoIdentityPool}",
          "federated_role_arn": "${CognitoAuthenticatedRole.Arn}",
          "aws_region": "${AWS::Region}",
          "inference_profiles_enabled": ${InferenceProfilesEnabled},
          "inference_profiles_provisioner_arn": "${InferenceProfileProvisionerFunction.Arn}"
        }
