Outputs:
  DashboardURL:
    Description: Direct URL to the CloudWatch dashboard
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'

  LogsInsightsURL:
    Description: URL to CloudWatch Logs Insights
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:logs-insights'

  MetricsTableArn:
    Description: ARN of the ClaudeCodeMetrics DynamoDB table
    Value: !GetAtt MetricsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MetricsTableArn'

  MetricsAggregatorRoleName:
    Description: Name of the MetricsAggregatorRole for cross-stack permissions
    Value: !Ref MetricsAggregatorRole
    Export:
      Name: !Sub '${AWS::StackName}-MetricsAggregatorRoleName'

  InferenceProfileMappingTableName:
    Description: Name of the InferenceProfileMapping DynamoDB table
    Condition: UseInferenceProfiles
    Value: !Ref InferenceProfileMappingTable
    Export:
      Name: !Sub '${AWS::StackName}-InferenceProfileMappingTableName'

  InferenceProfileMappingTableArn:
    Description: ARN of the InferenceProfileMapping DynamoDB table
    Condition: UseInferenceProfiles
    Value: !GetAtt InferenceProfileMappingTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InferenceProfileMappingTableArn'
