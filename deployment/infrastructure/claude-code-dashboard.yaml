  # CloudWatch Dashboard
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "custom",
              "x": 0,
              "y": 2,
              "width": 5,
              "height": 4,
              "properties": {
                "endpoint": "${TotalTokensWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Total Tokens Used"
              }
            },
            {
              "type": "custom",
              "x": 5,
              "y": 2,
              "width": 5,
              "height": 4,
              "properties": {
                "endpoint": "${TotalCostWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Total Cost (USD)"
              }
            },
            {
              "type": "custom",
              "x": 10,
              "y": 2,
              "width": 5,
              "height": 4,
              "properties": {
                "endpoint": "${ActiveUsersWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Active Users"
              }
            },
            {
              "type": "custom",
              "x": 15,
              "y": 2,
              "width": 5,
              "height": 4,
              "properties": {
                "endpoint": "${OperationsCountWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Operations Count"
              }
            },
            {
              "type": "custom",
              "x": 20,
              "y": 2,
              "width": 4,
              "height": 4,
              "properties": {
                "endpoint": "${CacheEfficiencyWidget.Arn}",
                "updateOn": {
                  "refresh": true,
                  "resize": true,
                  "timeRange": true
                },
                "title": "Cache Efficiency"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "ClaudeCode", "ActiveUsers", { "stat": "Sum" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Active Users Over Time",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "ClaudeCode", "LinesAdded", { "stat": "Sum", "label": "Lines Added" } ],
                  [ ".", "LinesRemoved", { "stat": "Sum", "label": "Lines Removed" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Lines Added/Removed Over Time",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                },
                "colors": [
                  "#10b981",
                  "#ef4444"
                ]
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | fields @timestamp, @message | filter @message like /claude_code.token.usage/ | parse @message /\"claude_code.token.usage\":(?<tokens>[0-9.]+)/ | stats sum(tokens) as total_tokens by bin(5m)",
                "region": "${MetricsRegion}",
                "title": "Token Usage Over Time",
                "view": "timeSeries",
                "stacked": false,
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                }
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
