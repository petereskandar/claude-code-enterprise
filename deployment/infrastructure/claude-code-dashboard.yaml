AWSTemplateFormatVersion: '2010-09-09'
Description: 'Claude Code monitoring dashboard with embedded custom widget Lambda functions'

Parameters:
  DashboardName:
    Type: String
    Default: ClaudeCodeDashboard
    Description: Name for the CloudWatch dashboard

  MetricsLogGroup:
    Type: String
    Default: /aws/claude-code/metrics
    Description: CloudWatch Log Group containing Claude Code metrics

  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where metrics log group exists

  InferenceProfilesEnabled:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      When true, deploys the BedrockMetricsBridge Lambda that reads AWS/Bedrock
      namespace metrics and writes them to the OTEL log group so all dashboard
      widgets and quota checks work without modification.

Conditions:
  UseInferenceProfiles: !Equals [!Ref InferenceProfilesEnabled, 'true']

Resources:
  # SSM Parameter for model pricing (used by TotalCostWidget)
  ModelPricingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/claude-code/${DashboardName}/model-pricing'
      Type: String
      Description: Per-model token pricing for cost estimation
      Value: !Sub |
        {
          "models": {
            "anthropic.claude-opus-4-7": {
              "input_per_million": 5.50,
              "output_per_million": 27.50,
              "cache_read_per_million": 0.55,
              "cache_write_per_million": 6.875
            },
            "anthropic.claude-sonnet-4-6-v1": {
              "input_per_million": 3.00,
              "output_per_million": 15.00,
              "cache_read_per_million": 0.30,
              "cache_write_per_million": 3.75
            },
            "anthropic.claude-haiku-4-5-20251001-v1:0": {
              "input_per_million": 0.80,
              "output_per_million": 4.00,
              "cache_read_per_million": 0.08,
              "cache_write_per_million": 1.00
            }
          },
          "default": {
            "input_per_million": 3.00,
            "output_per_million": 15.00,
            "cache_read_per_million": 0.30,
            "cache_write_per_million": 3.75
          }
        }

  # DynamoDB Table for Metrics Storage
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ClaudeCodeMetrics
      BillingMode: PAY_PER_REQUEST # On-demand scaling
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserActivityIndex
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: MetricTypeIndex
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: MonthlyIndex
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: ClaudeCodeMetrics
        - Key: Purpose
          Value: Dashboard metrics storage

  # DynamoDB Table for Inference Profile ARN → user mapping (inventory)
  InferenceProfileMappingTable:
    Type: AWS::DynamoDB::Table
    Condition: UseInferenceProfiles
    Properties:
      TableName: InferenceProfileMapping
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: profileArn
          AttributeType: S
      KeySchema:
        - AttributeName: profileArn
          KeyType: HASH
      Tags:
        - Key: Name
          Value: InferenceProfileMapping
        - Key: Purpose
          Value: Maps inference profile ARNs to user email and model

  QueryUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: ClaudeCode-QueryUtils
      Description: Shared utilities for rate limiting CloudWatch queries
      Content: ./lambda-functions/layer/
      CompatibleRuntimes:
        - python3.11
        - python3.12
      LicenseInfo: MIT

  MetricsUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: ClaudeCode-MetricsUtils
      Description: Shared utilities for querying CloudWatch Metrics
      Content: ./lambda-functions/layer/
      CompatibleRuntimes:
        - python3.11
        - python3.12
      LicenseInfo: MIT

  CustomWidgetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchLogsQuery
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                  - logs:DescribeLogGroups
                Resource: '*'
        - PolicyName: ServiceQuotasAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicequotas:GetServiceQuota
                  - servicequotas:ListServiceQuotas
                Resource: '*'
        - PolicyName: CloudWatchMetricsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
        - PolicyName: DynamoDBReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:BatchGetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt MetricsTable.Arn
                  - !Sub '${MetricsTable.Arn}/index/*'
        - PolicyName: SSMPricingReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/claude-code/${DashboardName}/model-pricing'
        - PolicyName: BedrockInferenceProfileRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:GetInferenceProfile
                  - bedrock:ListInferenceProfiles
                Resource: '*'

  MetricsAggregatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
        - PolicyName: CloudWatchMetricsPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt MetricsTable.Arn

  MetricsAggregatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ClaudeCode-MetricsAggregator
      Description: Aggregates Claude Code logs into CloudWatch Metrics
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt MetricsAggregatorRole.Arn
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          METRICS_LOG_GROUP: !Ref MetricsLogGroup
          METRICS_REGION: !Ref MetricsRegion
          METRICS_TABLE: !Ref MetricsTable
      Code: ./lambda-functions/metrics_aggregator/

  MetricsAggregatorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ClaudeCode-MetricsAggregator-Schedule
      Description: Trigger metrics aggregation every 5 minutes
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt MetricsAggregatorFunction.Arn
          Id: MetricsAggregatorTarget
          RetryPolicy:
            MaximumRetryAttempts: 2

  MetricsAggregatorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsAggregatorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MetricsAggregatorScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # Bedrock Metrics Bridge (only when inference profiles are enabled)
  # Reads AWS/Bedrock namespace metrics per InferenceProfileArn, maps ARN →
  # user email via Bedrock tags, then writes structured JSON to the OTEL log
  # group so all downstream consumers (aggregator, widgets, quota) work unchanged.
  # ---------------------------------------------------------------------------
  BedrockMetricsBridgeRole:
    Type: AWS::IAM::Role
    Condition: UseInferenceProfiles
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchMetricsRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                Resource: '*'
        - PolicyName: InferenceProfileMappingRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt InferenceProfileMappingTable.Arn
        - PolicyName: MetricsLogGroupWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${MetricsLogGroup}'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${MetricsLogGroup}:*'

  BedrockMetricsBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: UseInferenceProfiles
    Properties:
      LogGroupName: /aws/lambda/claude-code-bedrock-metrics-bridge
      RetentionInDays: 7

  BedrockMetricsBridgeFunction:
    Type: AWS::Lambda::Function
    Condition: UseInferenceProfiles
    Properties:
      FunctionName: ClaudeCode-BedrockMetricsBridge
      Description: Bridges AWS/Bedrock inference profile metrics to OTEL log format
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt BedrockMetricsBridgeRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          METRICS_LOG_GROUP: !Ref MetricsLogGroup
          INFERENCE_PROFILE_MAPPING_TABLE: !Ref InferenceProfileMappingTable
      Code: ./lambda-functions/bedrock_metrics_bridge/

  BedrockMetricsBridgeScheduleRule:
    Type: AWS::Events::Rule
    Condition: UseInferenceProfiles
    Properties:
      Name: ClaudeCode-BedrockMetricsBridge-Schedule
      Description: Bridge Bedrock inference profile metrics to OTEL log group every 5 minutes
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt BedrockMetricsBridgeFunction.Arn
          Id: BedrockMetricsBridgeTarget
          RetryPolicy:
            MaximumRetryAttempts: 2

  BedrockMetricsBridgeSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: UseInferenceProfiles
    Properties:
      FunctionName: !Ref BedrockMetricsBridgeFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BedrockMetricsBridgeScheduleRule.Arn

  TotalCostWidget:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ClaudeCode-Widget-TotalCost
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt CustomWidgetRole.Arn
      Timeout: 60
      Layers:
        - !Ref QueryUtilsLayer
        - !Ref MetricsUtilsLayer
      Environment:
        Variables:
          METRICS_REGION: !Ref MetricsRegion
          PRICING_PARAM_NAME: !Sub '/claude-code/${DashboardName}/model-pricing'
          MAX_QUERY_DAYS: '31'
      Code: ./lambda-functions/total_cost/

