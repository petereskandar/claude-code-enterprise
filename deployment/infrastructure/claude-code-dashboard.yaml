AWSTemplateFormatVersion: '2010-09-09'
Description: Claude Code monitoring dashboard with embedded custom widget Lambda functions
Parameters:
  DashboardName:
    Type: String
    Default: ClaudeCodeDashboard
    Description: Name for the CloudWatch dashboard
  MetricsLogGroup:
    Type: String
    Default: /aws/claude-code/metrics
    Description: CloudWatch Log Group containing Claude Code metrics
  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where metrics log group exists
  InferenceProfilesEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
    - 'true'
    - 'false'
    Description: "When true, deploys the BedrockMetricsBridge Lambda that reads AWS/Bedrock\
      \ namespace metrics and writes them to the OTEL log group so all dashboard widgets\
      \ and quota checks work without modification.\n"
Conditions:
  UseInferenceProfiles:
    Fn::Equals:
    - Ref: InferenceProfilesEnabled
    - 'true'
Resources:
  ModelPricingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name:
        Fn::Sub: /claude-code/${DashboardName}/model-pricing
      Type: String
      Description: Per-model token pricing for cost estimation
      Value:
        Fn::Sub: "{\n  \"models\": {\n    \"anthropic.claude-opus-4-7\": {\n     \
          \ \"input_per_million\": 5.50,\n      \"output_per_million\": 27.50,\n \
          \     \"cache_read_per_million\": 0.55,\n      \"cache_write_per_million\"\
          : 6.875\n    },\n    \"anthropic.claude-sonnet-4-6-v1\": {\n      \"input_per_million\"\
          : 3.00,\n      \"output_per_million\": 15.00,\n      \"cache_read_per_million\"\
          : 0.30,\n      \"cache_write_per_million\": 3.75\n    },\n    \"anthropic.claude-haiku-4-5-20251001-v1:0\"\
          : {\n      \"input_per_million\": 0.80,\n      \"output_per_million\": 4.00,\n\
          \      \"cache_read_per_million\": 0.08,\n      \"cache_write_per_million\"\
          : 1.00\n    }\n  },\n  \"default\": {\n    \"input_per_million\": 3.00,\n\
          \    \"output_per_million\": 15.00,\n    \"cache_read_per_million\": 0.30,\n\
          \    \"cache_write_per_million\": 3.75\n  }\n}\n"
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ClaudeCodeMetrics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      - AttributeName: sk
        AttributeType: S
      - AttributeName: gsi1pk
        AttributeType: S
      - AttributeName: gsi1sk
        AttributeType: S
      - AttributeName: gsi2pk
        AttributeType: S
      - AttributeName: gsi2sk
        AttributeType: S
      - AttributeName: gsi3pk
        AttributeType: S
      - AttributeName: gsi3sk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      - AttributeName: sk
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: UserActivityIndex
        KeySchema:
        - AttributeName: gsi1pk
          KeyType: HASH
        - AttributeName: gsi1sk
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: MetricTypeIndex
        KeySchema:
        - AttributeName: gsi2pk
          KeyType: HASH
        - AttributeName: gsi2sk
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: MonthlyIndex
        KeySchema:
        - AttributeName: gsi3pk
          KeyType: HASH
        - AttributeName: gsi3sk
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
      - Key: Name
        Value: ClaudeCodeMetrics
      - Key: Purpose
        Value: Dashboard metrics storage
  InferenceProfileMappingTable:
    Type: AWS::DynamoDB::Table
    Condition: UseInferenceProfiles
    Properties:
      TableName: InferenceProfileMapping
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: profileArn
        AttributeType: S
      KeySchema:
      - AttributeName: profileArn
        KeyType: HASH
      Tags:
      - Key: Name
        Value: InferenceProfileMapping
      - Key: Purpose
        Value: Maps inference profile ARNs to user email and model
  QueryUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: ClaudeCode-QueryUtils
      Description: Shared utilities for rate limiting CloudWatch queries
      Content:
        S3Bucket: claude-code-s3-cfnartifactsbucket-0enb7bvsxlut
        S3Key: fb583d6f2deb8282c151073eee3f7e44
      CompatibleRuntimes:
      - python3.11
      - python3.12
      LicenseInfo: MIT
  MetricsUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: ClaudeCode-MetricsUtils
      Description: Shared utilities for querying CloudWatch Metrics
      Content:
        S3Bucket: claude-code-s3-cfnartifactsbucket-0enb7bvsxlut
        S3Key: fb583d6f2deb8282c151073eee3f7e44
      CompatibleRuntimes:
      - python3.11
      - python3.12
      LicenseInfo: MIT
  CustomWidgetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: CloudWatchLogsQuery
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:StartQuery
            - logs:GetQueryResults
            - logs:StopQuery
            - logs:DescribeLogGroups
            Resource: '*'
      - PolicyName: ServiceQuotasAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - servicequotas:GetServiceQuota
            - servicequotas:ListServiceQuotas
            Resource: '*'
      - PolicyName: CloudWatchMetricsAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - cloudwatch:GetMetricStatistics
            - cloudwatch:GetMetricData
            - cloudwatch:ListMetrics
            Resource: '*'
      - PolicyName: DynamoDBReadAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:Query
            - dynamodb:GetItem
            - dynamodb:BatchGetItem
            - dynamodb:Scan
            Resource:
            - Fn::GetAtt:
              - MetricsTable
              - Arn
            - Fn::Sub: ${MetricsTable.Arn}/index/*
      - PolicyName: SSMPricingReadAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - ssm:GetParameter
            Resource:
            - Fn::Sub: arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/claude-code/${DashboardName}/model-pricing
      - PolicyName: BedrockInferenceProfileRead
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - bedrock:GetInferenceProfile
            - bedrock:ListInferenceProfiles
            Resource: '*'
  MetricsAggregatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: CloudWatchLogsAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:StartQuery
            - logs:GetQueryResults
            - logs:StopQuery
            - logs:DescribeLogGroups
            - logs:DescribeLogStreams
            Resource: '*'
      - PolicyName: CloudWatchMetricsPublish
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - cloudwatch:PutMetricData
            Resource: '*'
      - PolicyName: DynamoDBAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:UpdateItem
            - dynamodb:GetItem
            Resource:
            - Fn::GetAtt:
              - MetricsTable
              - Arn
  MetricsAggregatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ClaudeCode-MetricsAggregator
      Description: Aggregates Claude Code logs into CloudWatch Metrics
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - MetricsAggregatorRole
        - Arn
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          METRICS_LOG_GROUP:
            Ref: MetricsLogGroup
          METRICS_REGION:
            Ref: MetricsRegion
          METRICS_TABLE:
            Ref: MetricsTable
      Code:
        S3Bucket: claude-code-s3-cfnartifactsbucket-0enb7bvsxlut
        S3Key: 7eb39bb03c622cc6250b96d4fbce8b06
  MetricsAggregatorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ClaudeCode-MetricsAggregator-Schedule
      Description: Trigger metrics aggregation every 5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
      - Arn:
          Fn::GetAtt:
          - MetricsAggregatorFunction
          - Arn
        Id: MetricsAggregatorTarget
        RetryPolicy:
          MaximumRetryAttempts: 2
  MetricsAggregatorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: MetricsAggregatorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - MetricsAggregatorScheduleRule
        - Arn
  BedrockMetricsBridgeRole:
    Type: AWS::IAM::Role
    Condition: UseInferenceProfiles
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: CloudWatchMetricsRead
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - cloudwatch:GetMetricData
            Resource: '*'
      - PolicyName: InferenceProfileMappingRead
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:Scan
            - dynamodb:GetItem
            Resource:
            - Fn::GetAtt:
              - InferenceProfileMappingTable
              - Arn
      - PolicyName: MetricsLogGroupWrite
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            - logs:DescribeLogStreams
            Resource:
            - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${MetricsLogGroup}
            - Fn::Sub: arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${MetricsLogGroup}:*
  BedrockMetricsBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: UseInferenceProfiles
    Properties:
      LogGroupName: /aws/lambda/claude-code-bedrock-metrics-bridge
      RetentionInDays: 7
  BedrockMetricsBridgeFunction:
    Type: AWS::Lambda::Function
    Condition: UseInferenceProfiles
    Properties:
      FunctionName: ClaudeCode-BedrockMetricsBridge
      Description: Bridges AWS/Bedrock inference profile metrics to OTEL log format
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - BedrockMetricsBridgeRole
        - Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          METRICS_LOG_GROUP:
            Ref: MetricsLogGroup
          INFERENCE_PROFILE_MAPPING_TABLE:
            Ref: InferenceProfileMappingTable
      Code:
        S3Bucket: claude-code-s3-cfnartifactsbucket-0enb7bvsxlut
        S3Key: 95f632872e4253a0ba38d70df3845516
  BedrockMetricsBridgeScheduleRule:
    Type: AWS::Events::Rule
    Condition: UseInferenceProfiles
    Properties:
      Name: ClaudeCode-BedrockMetricsBridge-Schedule
      Description: Bridge Bedrock inference profile metrics to OTEL log group every
        5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
      - Arn:
          Fn::GetAtt:
          - BedrockMetricsBridgeFunction
          - Arn
        Id: BedrockMetricsBridgeTarget
        RetryPolicy:
          MaximumRetryAttempts: 2
  BedrockMetricsBridgeSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: UseInferenceProfiles
    Properties:
      FunctionName:
        Ref: BedrockMetricsBridgeFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - BedrockMetricsBridgeScheduleRule
        - Arn
  TotalCostWidget:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ClaudeCode-Widget-TotalCost
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - CustomWidgetRole
        - Arn
      Timeout: 60
      Layers:
      - Ref: QueryUtilsLayer
      - Ref: MetricsUtilsLayer
      Environment:
        Variables:
          METRICS_REGION:
            Ref: MetricsRegion
          PRICING_PARAM_NAME:
            Fn::Sub: /claude-code/${DashboardName}/model-pricing
          MAX_QUERY_DAYS: '31'
      Code:
        S3Bucket: claude-code-s3-cfnartifactsbucket-0enb7bvsxlut
        S3Key: 7e410b01217950633eefc980f31b3870
