  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName:
        Ref: DashboardName
      DashboardBody:
        Fn::Sub: "{\n  \"widgets\": [\n    {\n      \"type\": \"custom\",\n      \"\
          x\": 0,\n      \"y\": 2,\n      \"width\": 5,\n      \"height\": 4,\n  \
          \    \"properties\": {\n        \"endpoint\": \"${TotalTokensWidget.Arn}\"\
          ,\n        \"updateOn\": {\n          \"refresh\": true,\n          \"resize\"\
          : true,\n          \"timeRange\": true\n        },\n        \"title\": \"\
          Total Tokens Used\"\n      }\n    },\n    {\n      \"type\": \"custom\"\
          ,\n      \"x\": 5,\n      \"y\": 2,\n      \"width\": 5,\n      \"height\"\
          : 4,\n      \"properties\": {\n        \"endpoint\": \"${TotalCostWidget.Arn}\"\
          ,\n        \"updateOn\": {\n          \"refresh\": true,\n          \"resize\"\
          : true,\n          \"timeRange\": true\n        },\n        \"title\": \"\
          Total Cost (USD)\"\n      }\n    },\n    {\n      \"type\": \"custom\",\n\
          \      \"x\": 10,\n      \"y\": 2,\n      \"width\": 5,\n      \"height\"\
          : 4,\n      \"properties\": {\n        \"endpoint\": \"${ActiveUsersWidget.Arn}\"\
          ,\n        \"updateOn\": {\n          \"refresh\": true,\n          \"resize\"\
          : true,\n          \"timeRange\": true\n        },\n        \"title\": \"\
          Active Users\"\n      }\n    },\n    {\n      \"type\": \"custom\",\n  \
