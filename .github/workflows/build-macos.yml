---
name: Build macOS binaries (arm64)
description: |
  Builds credential-process-macos-arm64 and otel-helper-macos-arm64 using
  PyInstaller on a GitHub-hosted macos-latest (Apple Silicon) runner.
  Triggered manually via workflow_dispatch.
  Artifacts are uploaded and retained for 90 days.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag or SHA to build from'
        required: false
        default: 'develop'
        type: string

permissions: {}

jobs:
  build-macos-arm64:
    name: Build macOS arm64 binaries
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        working-directory: source
        run: poetry install --no-interaction --no-ansi

      - name: Build credential-process-macos-arm64
        working-directory: source
        run: |
          mkdir -p /tmp/macos-binaries
          poetry run pyinstaller \
            --onefile \
            --clean \
            --noconfirm \
            --target-arch=arm64 \
            --name=credential-process-macos-arm64 \
            --distpath=/tmp/macos-binaries \
            --workpath=/tmp/pyinstaller/credential-process \
            --specpath=/tmp/pyinstaller/credential-process \
            --log-level=WARN \
            --hidden-import=keyring.backends.macOS \
            --hidden-import=keyring.backends.SecretService \
            --hidden-import=keyring.backends.Windows \
            --hidden-import=keyring.backends.chainer \
            --hidden-import=claude_code_with_bedrock.models \
            credential_provider/__main__.py

      - name: Build otel-helper-macos-arm64
        working-directory: source
        run: |
          poetry run pyinstaller \
            --onefile \
            --clean \
            --noconfirm \
            --target-arch=arm64 \
            --name=otel-helper-macos-arm64 \
            --distpath=/tmp/macos-binaries \
            --workpath=/tmp/pyinstaller/otel-helper \
            --specpath=/tmp/pyinstaller/otel-helper \
            --log-level=WARN \
            otel_helper/__main__.py

      - name: Verify binaries
        run: |
          echo "=== Built binaries ==="
          ls -lh /tmp/macos-binaries/
          file /tmp/macos-binaries/credential-process-macos-arm64
          file /tmp/macos-binaries/otel-helper-macos-arm64

      - name: Upload macOS binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-binaries-${{ github.sha }}
          path: /tmp/macos-binaries/
          retention-days: 90
          if-no-files-found: error
